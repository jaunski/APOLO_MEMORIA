name: 🕵️‍♂️ Auditor de Memória (Blindado)

on:
  schedule:
    - cron: '*/20 * * * *' # Roda a cada 20 min
  workflow_dispatch:

jobs:
  auditoria:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar Dependências
        run: pip install google-api-python-client google-auth

      - name: Criar Script de Auditoria
        run: |
          cat <<EOF > audit_script.py
          import os
          import json
          import datetime
          from google.oauth2 import service_account
          from googleapiclient.discovery import build

          def audit():
              # 1. Tenta pegar a chave do ambiente
              key_content = os.environ.get('GCP_SA_KEY')
              if not key_content:
                  print("❌ ERRO CRÍTICO: O GitHub não entregou a chave (Secret GCP_SA_KEY vazia).")
                  print("👉 Ação: Vá em Settings > Secrets > Actions e adicione 'GCP_SA_KEY' novamente.")
                  exit(1)

              try:
                  creds_info = json.loads(key_content)
                  creds = service_account.Credentials.from_service_account_info(creds_info)
                  service = build('drive', 'v3', credentials=creds)

                  # 2. Busca o Arquivo Mestre
                  FILE_NAME = '00_DNA_MESTRE_INDEX'
                  results = service.files().list(
                      q="name = '" + FILE_NAME + "' and trashed = false",
                      fields="files(id, name, modifiedTime)"
                  ).execute()
                  items = results.get('files', [])

                  if not items:
                      print(f"❌ ERRO: O arquivo '{FILE_NAME}' não foi encontrado no Drive!")
                      exit(1)

                  # 3. Verifica a Hora
                  file = items[0]
                  mod_time = datetime.datetime.fromisoformat(file['modifiedTime'].replace('Z', '+00:00'))
                  now = datetime.datetime.now(datetime.timezone.utc)
                  diff_minutes = (now - mod_time).total_seconds() / 60

                  print(f"🔍 Arquivo: {file['name']}")
                  print(f"🕒 Modificado há: {diff_minutes:.1f} minutos")

                  if diff_minutes > 30:
                      print("🚨 ALERTA: Apolo não salva a memória há mais de 30 minutos!")
                      exit(1) # Falha para avisar
                  else:
                      print("✅ SUCESSO: Memória está fresca e atualizada.")
                      exit(0)

              except Exception as e:
                  print(f"❌ ERRO TÉCNICO: {str(e)}")
                  exit(1)

          if __name__ == '__main__':
              audit()
          EOF

      - name: Executar Auditoria
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: python audit_script.py
