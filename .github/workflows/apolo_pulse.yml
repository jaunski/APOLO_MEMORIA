name: 💓 Apolo Heartbeat
on:
  schedule:
    - cron: '*/5 * * * *' # Roda a cada 5 minutos
  workflow_dispatch:

permissions:
  contents: write

jobs:
  pulso-silencioso:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Atualiza o Relógio
        run: |
          date > heartbeat.txt
          git config user.name "Apolo Bot"
          git config user.email "apolo@bot.com"
          git add heartbeat.txt
          git commit -m "💓 Pulso do Apolo: 5 min" || echo "Nada a atualizar"
          git push
